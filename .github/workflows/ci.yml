name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ── Backend unit + integration tests ──────────────────────────────────
  backend-unit-integration:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        db:
          - sqlite
          - postgres
    services:
      postgres:
        image: ${{ matrix.db == 'postgres' && 'postgres:18.2' || '' }}
        env:
          POSTGRES_USER: flow
          POSTGRES_PASSWORD: flow
          POSTGRES_DB: flow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U flow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      H4CKATH0N_ENV: testing
      H4CKATH0N_RP_ID: localhost
      H4CKATH0N_ORIGIN: http://localhost:5173
      H4CKATH0N_DATABASE_URL: ${{ matrix.db == 'postgres'
        && 'postgresql+asyncpg://flow:flow@localhost:5432/flow'
        || 'sqlite+aiosqlite:///./data/test.db' }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('api/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        working-directory: api
        run: uv sync --frozen

      - name: Lint (ruff)
        working-directory: api
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        working-directory: api
        run: |
          mkdir -p data
          uv run pytest tests/ -v --tb=short --junitxml=junit-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results-${{ matrix.db }}
          path: api/junit-results.xml

  # ── Documentation drift check ────────────────────────────────────────
  docs-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('api/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: api
        run: uv sync --frozen

      - name: Run docs drift check
        run: python3 scripts/docs/check_docs.py

  # ── Frontend unit tests ───────────────────────────────────────────────
  frontend-unit-integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: OpenAPI drift check
        working-directory: web
        run: npm run gen:api:check

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Type check
        working-directory: web
        run: npm run typecheck

      - name: Run tests
        working-directory: web
        run: npm run test

  # ── End-to-end tests ──────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        db:
          - sqlite
          - postgres
    services:
      postgres:
        image: ${{ matrix.db == 'postgres' && 'postgres:18.2' || '' }}
        env:
          POSTGRES_USER: flow
          POSTGRES_PASSWORD: flow
          POSTGRES_DB: flow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U flow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      H4CKATH0N_ENV: testing
      H4CKATH0N_RP_ID: localhost
      H4CKATH0N_ORIGIN: http://localhost:5173
      H4CKATH0N_DATABASE_URL: ${{ matrix.db == 'postgres'
        && 'postgresql+asyncpg://flow:flow@localhost:5432/flow'
        || 'sqlite+aiosqlite:///./data/test.db' }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('api/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: api
        run: uv sync --frozen

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: web
        run: npx playwright install-deps chromium

      - name: Create data directory
        run: mkdir -p api/data

      - name: Run E2E tests
        working-directory: web
        run: npx playwright test
        timeout-minutes: 10

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.db }}
          path: |
            web/playwright-report/
            web/test-results/

  # ── Container security scan (backend) ─────────────────────────────────
  container-security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          load: true
          tags: flow-backend:scan
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || '1970-01-01T00:00:00Z' }}
            VCS_REF=${{ github.sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}

      - name: Run Trivy vulnerability scan (CRITICAL)
        id: trivy-backend
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: flow-backend:scan
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          output: trivy-report.txt

      - name: Report backend scan result prominently
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.trivy-backend.outcome }}" == "failure" ]]; then
            echo "::warning title=Container scan failed (backend)::Trivy found CRITICAL vulnerabilities in flow-backend:scan. See trivy-ci-report / trivy-sarif-report artifacts."
            {
              echo "## Container scan failed (backend)"
              echo ""
              echo "Trivy found **CRITICAL** vulnerabilities in \`flow-backend:scan\`."
              echo ""
              echo "Artifacts:"
              echo "- trivy-ci-report (table output)"
              echo "- trivy-sarif-report (SARIF output)"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Container scan passed (backend)"
              echo ""
              echo "No **CRITICAL** vulnerabilities found in \`flow-backend:scan\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-ci-report
          path: trivy-report.txt

      - name: Trivy SARIF report (HIGH+CRITICAL)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: flow-backend:scan
          format: sarif
          severity: HIGH,CRITICAL
          output: trivy-results.sarif

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-sarif-report
          path: trivy-results.sarif

  # ── Container security scan (flow-web) ──────────────────────────────
  container-security-web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend artifact
        run: bash scripts/ci/package_frontend.sh web

      - name: Copy frontend archive to web build context
        run: cp frontend.tar.xz web/frontend.tar.xz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build flow-web image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./web
          file: ./web/Dockerfile
          push: false
          load: true
          tags: flow-web:scan
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || '1970-01-01T00:00:00Z' }}
            VCS_REF=${{ github.sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}

      - name: Run Trivy vulnerability scan (CRITICAL)
        id: trivy-web
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: flow-web:scan
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          output: trivy-web-report.txt

      - name: Report web scan result prominently
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.trivy-web.outcome }}" == "failure" ]]; then
            echo "::warning title=Container scan failed (web)::Trivy found CRITICAL vulnerabilities in flow-web:scan. See trivy-web-ci-report / trivy-web-sarif-report artifacts."
            {
              echo "## Container scan failed (web)"
              echo ""
              echo "Trivy found **CRITICAL** vulnerabilities in \`flow-web:scan\`."
              echo ""
              echo "Artifacts:"
              echo "- trivy-web-ci-report (table output)"
              echo "- trivy-web-sarif-report (SARIF output)"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Container scan passed (web)"
              echo ""
              echo "No **CRITICAL** vulnerabilities found in \`flow-web:scan\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-web-ci-report
          path: trivy-web-report.txt

      - name: Trivy SARIF report (HIGH+CRITICAL)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: flow-web:scan
          format: sarif
          severity: HIGH,CRITICAL
          output: trivy-web-results.sarif

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-web-sarif-report
          path: trivy-web-results.sarif

  # ── Compose-based E2E tests ─────────────────────────────────────────
  e2e-compose:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        db:
          - sqlite
          - postgres
    env:
      H4CKATH0N_ENV: testing
      H4CKATH0N_RP_ID: localhost
      H4CKATH0N_ORIGIN: http://localhost:8080
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: web
        run: npx playwright install-deps chromium

      - name: Build frontend artifact
        run: bash scripts/ci/package_frontend.sh web

      - name: Copy frontend archive to web build context
        run: cp frontend.tar.xz web/frontend.tar.xz

      - name: Build flow-web image
        run: |
          docker build -t flow-web:ci \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VCS_REF="${{ github.sha }}" \
            web/

      - name: Build flow backend image
        run: |
          docker build -t flow:ci \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VCS_REF="${{ github.sha }}" \
            api/

      - name: Start compose stack
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.db }}" == "postgres" ]]; then
            DB_URL="postgresql+asyncpg://flow:flow@postgres:5432/flow"
          else
            DB_URL="sqlite+aiosqlite:///./data/test.db"
          fi

          FLOW_WEB_IMAGE=flow-web:ci \
          FLOW_IMAGE=flow:ci \
          H4CKATH0N_DATABASE_URL="$DB_URL" \
          docker compose up -d

      - name: Wait for stack to be ready
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for flow-web on port 8080..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "flow-web is ready"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

          echo "Waiting for backend API through proxy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/healthz > /dev/null 2>&1; then
              echo "Backend API is ready"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

          # Fail fast if backend never became ready, and dump useful logs.
          if ! curl -sf http://localhost:8080/api/healthz > /dev/null 2>&1; then
            echo "Backend never became ready. Dumping compose status and logs."
            docker compose ps || true
            docker compose logs --no-color --tail=200 flow || true
            docker compose logs --no-color --tail=200 postgres || true
            docker compose logs --no-color --tail=200 flow-web || true
            exit 1
          fi

      - name: Run compose E2E tests
        working-directory: web
        run: npx playwright test e2e/compose.spec.ts
        timeout-minutes: 10
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Dump compose logs
        if: failure()
        run: docker compose logs --tail=200

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-compose-report-${{ matrix.db }}
          path: |
            web/playwright-report/
            web/test-results/
